<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Habit Tracker</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0f7fa 0%, #80deea 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2.5rem; 
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 310px; 
            margin-top: -40px; 
        }
        h1 { color: #007c91; margin-bottom: 0.5rem; }
        .streak-badge {
            font-size: 3.5rem; 
            color: #00acc1;
            font-weight: bold;
            margin: 0.5rem 0;
        }
        .status { color: #546e7a; font-style: italic; min-height: 3rem; }
        .buttons { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }
        .btn {
            padding: 12px;
            border: none;
            border-radius: 5px; 
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
            text-decoration: none;
            color: white;
        }
        .btn-start { background: #4caf50; }
        
        
        .btn-drink { 
            background: #03a9f4; 
            padding: 20px 10px; 
            font-size: 1.2rem;
        }
        
        .btn-end { background: #ff7043; }
        .btn:hover { transform: scale(1.02); filter: brightness(1.1); }
    </style>
</head>
<body>
    <div class="card">
        <h1>Water Tracker</h1>
        <div class="status">{{ data.status }}</div>
        
        <div class="streak-badge">
            {{ data.streak }} 🔥
        </div>
        <p>Текущая серия</p>

        <div class="buttons">
            <a href="/start" class="btn btn-start">Новый день</a>
            <a href="/drink" class="btn btn-drink">Я выпил воду 💧</a>
            <a href="/end" class="btn btn-end">Завершить день</a>
        </div>
        
        <p style="margin-top: 25px; font-size: 0.9rem; color: #999; text-align: left;">День: {{ data.day }}</p> </div>
</body>
</html>
